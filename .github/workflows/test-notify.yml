name: Test notification (dummy success)
on: workflow_dispatch

permissions:
  contents: read
  issues: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Create test issue (as bot)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --repo ${{ github.repository }} \
            --title '🧪 [BOT] Push notification test' \
            --body 'This issue was created by github-actions[bot] — should trigger phone push if Layer 1 is set up correctly. Close after verification.'
